name: "workflow TP4"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: |
          cd TP4-PB-Backend
          mvn clean package -DskipTests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Run Services
        run: |
          npm install -g wait-on
          
          cd TP4-PB-Frontend
          npm install
          npm run dev & 
          
          cd ../TP4-PB-Backend/target
          echo "Conteúdo da pasta target:"
          ls -R
          
          nohup java -Xmx512m -jar *.jar --server.port=8080 > backend-log.txt 2>&1 &
          
          echo "Aguardando serviços (Vite: 5173, Spring: 8080)..."
          wait-on http://localhost:5173 http://localhost:8080 --timeout 180000

      - name: Run Tests
        run: |
          cd TP4-PB-Backend
          mvn test

      - name: Debug Backend Logs
        if: failure()
        run: |
          echo "--- LOG DO BACKEND ---"
          cat TP4-PB-Backend/target/backend-log.txt || echo "Arquivo de log não encontrado."

      - name: Upload Jacoco Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: TP4-PB-Backend/target/site/jacoco/